{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FPL Assistant</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'fantasy/css/auth.css' %}">
</head>
<body class="auth-bg d-flex flex-column justify-content-center align-items-center vh-100">

  <!-- Header above the card -->
  <div class="text-center mb-4">
      <h1 class="fw-bold text-dark display-6">FPL Assistant</h1>
  </div>

  <!-- Register Card -->
  <div class="auth-card position-relative">
    <div class="bg-pattern position-absolute w-100 h-100 rounded-4"></div>
    <div class="card shadow-sm border-0 rounded-4 position-relative">
      <div class="card-body p-4">
        <h3 class="text-center mb-4 fw-semibold text-dark">Register</h3>

        {% if error %}
          <div class="alert alert-danger small">{{ error }}</div>
        {% endif %}

        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold text-dark">Username</label>
            <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Choose a username" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label fw-semibold text-dark">Password</label>
            <input type="password" class="form-control form-control-lg" id="password" name="pwd" placeholder="Enter a password" required>
          </div>
          <div class="mb-3">
            <label for="password_confirm" class="form-label fw-semibold text-dark">Confirm Password</label>
            <input type="password" class="form-control form-control-lg" id="password_confirm" name="pwd_c" placeholder="Confirm your password" required>
          </div>
          <button type="submit" class="btn btn-dark w-100 btn-lg fw-semibold">Register</button>
        </form>

        <p class="text-center mt-4 mb-0 text-muted small">
          Already have an account? <a href="{% url 'login' %}" class="text-dark fw-semibold">Login here</a>
        </p>
      </div>
    </div>
  </div>

</body>
</html>
