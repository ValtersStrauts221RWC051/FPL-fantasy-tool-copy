services:
  - type: web
    name: django-web
    env: python
    plan: free                     
    buildCommand: "bash ./build.sh"
    startCommand: "gunicorn fantasy_project.wsgi:application --chdir src --preload"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"          
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@example.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: REQUIRE_DB_SSL
        value: "True"
      - key: DATABASE_URL       
        fromDatabase:
          name: django-postgres
          property: connectionString

databases:
  - name: django-postgres
    plan: free
    databaseName: django
    user: django